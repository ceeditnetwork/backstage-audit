apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ssti-sandbox-escape-test
  title: "Security Audit: Sandbox Escape"
  description: "Testing if the isolated-vm sandbox can be bypassed."
spec:
  type: service
  owner: security-audit
  
  parameters:
    - title: Audit Details
      properties:
        name:
          type: string
          title: Audit Name
          default: "Sandbox_Test_01"

  # This 'steps:' key MUST be here before the '- id:'
  steps:
    - id: fetch
      action: fetch:template
      input:
        url: ./skeleton
        values:
          # TEST: See if the engine calculates 2 or just prints text
          leak: "{{ 1 + 1 }}"

    - id: log-result
      action: debug:log
      input:
        message: "Audit Result: {{ values.leak }}"
